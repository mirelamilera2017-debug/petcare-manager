<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Agendamentos | PetCare Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="listar()">

<div class="app">

    <aside class="sidebar">
        <h2>🐾 PetCare</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="tutores.html">👤 Tutores</a>
        <a href="pets.html">🐶 Pets</a>
        <a href="produtos.html">🦴 Produtos</a>
        <a href="servicos.html">✂ Serviços</a>
        <a href="agendamentos.html" class="active">📅 Agendamentos</a>
        <a href="#" onclick="logout()">🚪 Sair</a>
    </aside>

    <main class="content">

        <div class="topbar">
            <h1>Agendamentos</h1>
            <span>PetCare Manager</span>
        </div>

        <div class="card">
            <form id="formulario" onsubmit="salvar(event)">
                <input type="hidden" id="id">

                <div class="form-grid">

                    <div>
                        <label>Tutor</label>
                        <select id="tutorId"></select>
                    </div>

                    <div>
                        <label>Pet</label>
                        <select id="petId"></select>
                    </div>

                    <div>
                        <label>Serviço</label>
                        <select id="servicoId"></select>
                    </div>

                    <div>
                        <label>Data</label>
                        <input type="date" id="data">
                    </div>

                    <div>
                        <label>Hora</label>
                        <input type="time" id="hora">
                    </div>

                    <div>
                        <label>Status</label>
                        <select id="status">
                            <option>Agendado</option>
                            <option>Finalizado</option>
                            <option>Cancelado</option>
                        </select>
                    </div>

                </div>

                <button class="btn-primary" type="submit">Salvar Agendamento</button>
            </form>
        </div>

        <div class="table-box">
            <input class="search-box" id="pesquisa" onkeyup="pesquisar()" placeholder="Pesquisar agendamento...">

            <table>
                <thead>
                    <tr>
                        <th>Tutor</th>
                        <th>Pet</th>
                        <th>Serviço</th>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabela"></tbody>
            </table>
        </div>

    </main>
</div>

<script src="js/api.js"></script>
<script src="js/agendamentos.js"></script>

</body>
</html>
