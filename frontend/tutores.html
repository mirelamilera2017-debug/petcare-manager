<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tutores | PetCare Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="carregarTutores()">

<div class="sidebar">
    <div class="logo">🐾 PetCare</div>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a class="active" href="tutores.html">👤 Tutores</a>
    <a href="pets.html">🐶 Pets</a>
    <a href="produtos.html">🦴 Produtos</a>
    <a href="servicos.html">✂ Serviços</a>
    <a href="agendamentos.html">📅 Agendamentos</a>
    <a onclick="logout()">🚪 Sair</a>
</div>

<main class="conteudo">
    <div class="topo-dashboard">
        <div>
            <h1>Tutores</h1>
            <p>Gerenciamento de tutores do PetShop</p>
        </div>
        <div class="badge-sistema">PetCare Manager</div>
    </div>

    <section class="boas-vindas">
        <input type="hidden" id="idTutor">

        <div class="form-grid">
            <div>
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Nome do tutor">
            </div>

            <div>
                <label>Telefone</label>
                <input type="text" id="telefone" placeholder="Telefone">
            </div>

            <div>
                <label>Endereço</label>
                <input type="text" id="endereco" placeholder="Endereço">
            </div>
        </div>

        <button class="btn-salvar" onclick="salvarTutor()">Salvar Tutor</button>
    </section>

    <section class="boas-vindas">
        <input type="text" id="pesquisa" placeholder="Pesquisar tutor..." oninput="filtrarTutores()">

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Endereço</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaTutores"></tbody>
        </table>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/tutores.js"></script>
</body>
</html>
