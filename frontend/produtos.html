<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Produtos | PetCare Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="listar()">

<div class="app">

    <aside class="sidebar">
        <h2>🐾 PetCare</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="tutores.html">👤 Tutores</a>
        <a href="pets.html">🐶 Pets</a>
        <a href="produtos.html" class="active">🦴 Produtos</a>
        <a href="servicos.html">✂ Serviços</a>
        <a href="agendamentos.html">📅 Agendamentos</a>
        <a href="#" onclick="logout()">🚪 Sair</a>
    </aside>

    <main class="content">
        <div class="topbar">
            <h1>Produtos</h1>
            <span>PetCare Manager</span>
        </div>

        <div class="card">
            <form id="formulario" onsubmit="salvar(event)">
                <input type="hidden" id="id">

                <div class="form-grid">
                    <div>
                        <label>Nome</label>
                        <input type="text" id="nome">
                    </div>

                    <div>
                        <label>Descrição</label>
                        <input type="text" id="descricao">
                    </div>

                    <div>
                        <label>Preço</label>
                        <input type="number" id="preco" step="0.01">
                    </div>

                    <div>
                        <label>Estoque</label>
                        <input type="number" id="estoque">
                    </div>
                </div>

                <button class="btn-primary" type="submit">Salvar Produto</button>
            </form>
        </div>

        <div class="table-box">
            <input class="search-box" id="pesquisa" onkeyup="pesquisar()" placeholder="Pesquisar produto...">

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/produtos.js"></script>

</body>
</html>
