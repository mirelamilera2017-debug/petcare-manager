<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Produtos | PetCare Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="carregarProdutos()">

<div class="sidebar">
    <div class="logo">🐾 PetCare</div>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="tutores.html">👤 Tutores</a>
    <a href="pets.html">🐶 Pets</a>
    <a class="active" href="produtos.html">🦴 Produtos</a>
    <a href="servicos.html">✂ Serviços</a>
    <a href="agendamentos.html">📅 Agendamentos</a>
    <a onclick="logout()">🚪 Sair</a>
</div>

<main class="conteudo">
    <div class="topo-dashboard">
        <div>
            <h1>Produtos</h1>
            <p>Gerenciamento de produtos do PetShop</p>
        </div>
        <div class="badge-sistema">PetCare Manager</div>
    </div>

    <section class="boas-vindas">
        <input type="hidden" id="idProduto">

        <div class="form-grid">
            <div>
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Nome do produto">
            </div>

            <div>
                <label>Descrição</label>
                <input type="text" id="descricao" placeholder="Descrição">
            </div>

            <div>
                <label>Preço</label>
                <input type="number" id="preco" placeholder="Preço" step="0.01">
            </div>

            <div>
                <label>Estoque</label>
                <input type="number" id="estoque" placeholder="Quantidade">
            </div>
        </div>

        <button class="btn-salvar" onclick="salvarProduto()">Salvar Produto</button>
    </section>

    <section class="boas-vindas">
        <input type="text" id="pesquisa" placeholder="Pesquisar produto..." oninput="filtrarProdutos()">

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Preço</th>
                    <th>Estoque</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaProdutos"></tbody>
        </table>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/produtos.js"></script>
</body>
</html>
