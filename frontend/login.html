<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - PetCare Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="logo">🐾</div>

        <h1>PetCare Manager</h1>
        <p class="subtitle">Sistema Fullstack para Gestão de Petshop</p>

        <label>Nome</label>
        <input type="text" id="nome" placeholder="Use apenas para criar conta">

        <label>E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail">

        <label>Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">

        <button class="btn-primary" onclick="loginUsuario()">Entrar</button>
        <button class="btn-secondary" onclick="cadastrarUsuario()">Criar conta</button>

        <p class="subtitle" style="margin-top: 20px;">
            Node.js + JWT + CRUD + Swagger
        </p>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
